<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a18"/>
      <stop offset="50%" stop-color="#07080d"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff2d92" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff2d92" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#00d6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Pulse dot + brand line -->
  <circle cx="80" cy="100" r="8" fill="#ff2d92"/>
  <text x="104" y="106" font-family="'JetBrains Mono', monospace" font-size="20" font-weight="700" fill="#ff2d92" letter-spacing="4">NVI · NAIROBI VIBE INDEX</text>

  <!-- Big NVI logo (pixel-style approximation) -->
  <g transform="translate(80, 200)" fill="#ff2d92">
    <rect x="0" y="0" width="36" height="180"/>
    <rect x="48" y="0" width="36" height="36"/>
    <rect x="48" y="36" width="36" height="36"/>
    <rect x="48" y="72" width="36" height="36"/>
    <rect x="96" y="108" width="36" height="36"/>
    <rect x="144" y="0" width="36" height="180"/>
    <rect x="216" y="0" width="36" height="36"/>
    <rect x="252" y="36" width="36" height="36"/>
    <rect x="288" y="0" width="36" height="36"/>
    <rect x="252" y="72" width="36" height="108"/>
  </g>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="'Inter', sans-serif" font-size="38" font-weight="700" fill="#e8edf7">The data the city is too drunk to notice.</text>
  <text x="80" y="498" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#8896b8">Live nightlife intelligence — vibe scores for Nairobi's</text>
  <text x="80" y="528" font-family="'Inter', sans-serif" font-size="22" font-weight="400" fill="#8896b8">clubs, bars, and restaurants.</text>

  <!-- Right-side gauge mockup -->
  <g transform="translate(870, 240)">
    <rect x="0" y="0" width="240" height="160" rx="14" fill="#0e1019" stroke="#1c2237" stroke-width="1"/>
    <text x="120" y="36" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#8896b8" letter-spacing="2">CITYWIDE VIBE</text>
    <text x="120" y="106" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="72" font-weight="700" fill="#e8edf7">72%</text>
    <text x="120" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff8c33" letter-spacing="2">HIGH</text>
  </g>

  <!-- Mini bar chart mockup -->
  <g transform="translate(870, 430)">
    <rect x="0" y="0" width="240" height="100" rx="10" fill="#0e1019" stroke="#1c2237" stroke-width="1"/>
    <text x="14" y="22" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="700" fill="#8896b8" letter-spacing="2">POPULAR TIMES</text>
    <g transform="translate(14, 32)">
      <rect x="0" y="48" width="9" height="12" fill="#00d6ff" rx="2"/>
      <rect x="12" y="50" width="9" height="10" fill="#00d6ff" rx="2"/>
      <rect x="24" y="46" width="9" height="14" fill="#00d6ff" rx="2"/>
      <rect x="36" y="40" width="9" height="20" fill="#ffcc00" rx="2"/>
      <rect x="48" y="32" width="9" height="28" fill="#ffcc00" rx="2"/>
      <rect x="60" y="22" width="9" height="38" fill="#ff8c33" rx="2"/>
      <rect x="72" y="12" width="9" height="48" fill="#ff8c33" rx="2"/>
      <rect x="84" y="4" width="9" height="56" fill="#ff3355" rx="2"/>
      <rect x="96" y="0" width="9" height="60" fill="#ff3355" rx="2"/>
      <rect x="108" y="6" width="9" height="54" fill="#ff8c33" rx="2"/>
      <rect x="120" y="14" width="9" height="46" fill="#ff8c33" rx="2"/>
      <rect x="132" y="22" width="9" height="38" fill="#ffcc00" rx="2"/>
      <rect x="144" y="36" width="9" height="24" fill="#ffcc00" rx="2"/>
      <rect x="156" y="44" width="9" height="16" fill="#00d6ff" rx="2"/>
      <rect x="168" y="50" width="9" height="10" fill="#00d6ff" rx="2"/>
      <rect x="180" y="52" width="9" height="8" fill="#00d6ff" rx="2"/>
      <rect x="192" y="54" width="9" height="6" fill="#00d6ff" rx="2"/>
      <rect x="204" y="50" width="9" height="10" fill="#00d6ff" rx="2"/>
    </g>
  </g>
</svg>
